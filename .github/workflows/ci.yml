name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nihongo
          POSTGRES_PASSWORD: nihongo
          POSTGRES_DB: nihongo
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npx prisma generate && npx prisma migrate deploy
        working-directory: services
        env:
          DATABASE_URL: postgresql://nihongo:nihongo@localhost:5432/nihongo
      - run: npm run lint -w @edu/nihongo-services
      - run: npm test -- --coverage -w @edu/nihongo-services
        env:
          DATABASE_URL: postgresql://nihongo:nihongo@localhost:5432/nihongo
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret
      - run: npm run build -w @edu/nihongo-services

  nihongo-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w @edu/nihongo-web
      - run: npm run build -w @edu/nihongo-web
        env:
          API_URL: http://localhost:3000

  english-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint -w @edu/english-web
