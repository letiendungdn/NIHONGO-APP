version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: nihongo-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: nihongo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nihongo
      POSTGRES_PASSWORD: nihongo
      POSTGRES_DB: nihongo
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nihongo -d nihongo']
      interval: 5s
      timeout: 5s
      retries: 10

  content-service:
    build:
      context: .
      dockerfile: services/content-service/Dockerfile
    container_name: nihongo-content
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nihongo:nihongo@postgres:5432/nihongo
      CONTENT_GRPC_PORT: 50051
    depends_on:
      postgres:
        condition: service_healthy

  exam-service:
    build:
      context: .
      dockerfile: services/exam-service/Dockerfile
    container_name: nihongo-exam
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://nihongo:nihongo@postgres:5432/nihongo
      REDIS_URL: redis://redis:6379
      EXAM_GRPC_PORT: 50052
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: nihongo-gateway
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      PORT: 3000
      CONTENT_GRPC_URL: content-service:50051
      EXAM_GRPC_URL: exam-service:50052
      DATABASE_URL: postgresql://nihongo:nihongo@postgres:5432/nihongo
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3001}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@nihongo.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      - content-service
      - exam-service

  nihongo-web:
    build:
      context: .
      dockerfile: apps/nihongo-web/Dockerfile
    container_name: nihongo-web
    restart: unless-stopped
    ports:
      - '5173:5173'
    environment:
      API_URL: http://api-gateway:3000
    depends_on:
      - api-gateway

  english-web:
    build:
      context: .
      dockerfile: apps/english-web/Dockerfile
    container_name: english-web
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgresql://nihongo:nihongo@postgres:5432/english_learning
      NEXT_PUBLIC_NIHONGO_APP_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
